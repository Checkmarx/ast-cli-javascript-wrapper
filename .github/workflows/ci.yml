name: AST Javascript wrapper CI

on: [pull_request]
permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: cx-public-ubuntu-x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs
          git lfs install

      - name: Verify single lockfile
        run: |
          if [ -f package-lock.json ] && [ -f yarn.lock ]; then
            echo "ERROR: Both lockfiles exist"
            exit 1
          fi

          if [ ! -f yarn.lock ] && [ ! -f package-lock.json ]; then
            echo "ERROR: No lockfile found,Policy requires exactly ONE package manager lockfile"
            exit 1
          fi

      - name: Use Node.js 22.11.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.11.0
      - name: Configure echohq auth (both hosts)
        env:
          ECHO_LIBRARIES_ACCESS_KEY: ${{ secrets.ECHO_LIBRARIES_ACCESS_KEY }}
        run: |
          npm config set //npm.echohq.com/:_authToken "${ECHO_LIBRARIES_ACCESS_KEY}"
          npm config set //packages.echohq.com/:_authToken "${ECHO_LIBRARIES_ACCESS_KEY}"
      - run: npm ci
        env:
          ECHO_LIBRARIES_ACCESS_KEY: ${{ secrets.ECHO_LIBRARIES_ACCESS_KEY }}
      - name: Code Linting
        run: npm run lint
      - run: npm run build --if-present

      - name: Check existence of cx-linux binary
        run: |
          if [ ! -f "src/main/wrapper/resources/cx-linux" ]; then
            echo "cx-linux binary does not exist"; exit 1;
          fi

      - name: Check existence of cx.exe binary
        run: |
          if [ ! -f "src/main/wrapper/resources/cx.exe" ]; then
            echo "cx.exe binary does not exist"; exit 1;
          fi

      - name: Check existence of cx-mac binary
        run: |
          if [ ! -f "src/main/wrapper/resources/cx-mac" ]; then
            echo "cx-mac binary does not exist"; exit 1;
          fi

      - name: Run tests
        env:
          CX_CLIENT_ID: ${{ secrets.CX_CLIENT_ID}}
          CX_CLIENT_SECRET: ${{ secrets.CX_CLIENT_SECRET}}
          CX_BASE_URI: ${{ secrets.CX_BASE_URI }}
          CX_TENANT: ${{ secrets.CX_TENANT }}
          CX_APIKEY: ${{ secrets.CX_APIKEY }}
        run: npm test